<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

    <header id="navbar">
        <div class="logo">
            <h1>El backlog de Detrux</h1>
        </div>
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
        </button>
        <nav>
            <ul id="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li class="menu-desplegable">
                    <a href="categorias.html">Categorías ▼</a>
                    <ul class="submenu">
                        <li><a href="categoria.html">Acción</a></li>
                        <li><a href="#">Aventura</a></li>
                        <li><a href="#">Estrategia</a></li>
                        <li><a href="#">Indie</a></li>
                        <li><a href="#">RPG</a></li>
                    </ul>
                </li>
                <li><a href="galeria.html" style="color: var(--text-primary); text-shadow: 0 0 8px var(--accent-color);">Galería</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 100px;">
        <div class="section-header section-reveal">
            <h2>Modo Foto: <span class="texto-resaltado">Capturas</span></h2>
            <div class="divider"></div>
            <p>Mis mejores momentos guardados.</p>
        </div>

        <section class="seccion-galeria section-reveal">
            <div class="grid-galeria">
                <div class="img-wrapper card-reveal">
                    <img src="https://placehold.co/800x450/171a21/66c0f4?text=Captura+Alan+Wake" alt="Alan Wake 2" onclick="abrirModal(this.src)">
                </div>
                <div class="img-wrapper card-reveal">
                    <img src="https://placehold.co/800x450/171a21/66c0f4?text=Captura+Resident+Evil" alt="Resident Evil" onclick="abrirModal(this.src)">
                </div>
                <div class="img-wrapper card-reveal">
                    <img src="https://placehold.co/800x450/171a21/66c0f4?text=Captura+ZZZ" alt="Zenless Zone Zero" onclick="abrirModal(this.src)">
                </div>
                <div class="img-wrapper card-reveal">
                    <img src="https://placehold.co/800x450/171a21/66c0f4?text=Captura+Indie" alt="Juego Indie" onclick="abrirModal(this.src)">
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="redes-sociales">
            <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-twitter"></i></a>

        </div>
        <p>&copy; 2026 El backlogg de Detrux. Todos los derechos reservados.</p>
    </footer>

    <div id="modal-galeria" class="modal">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <img class="modal-contenido" id="img-modal" alt="Vista ampliada">
    </div>

    <script src="js/index.js"></script>

</html>
